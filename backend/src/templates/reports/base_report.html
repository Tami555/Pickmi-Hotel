<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ base_css_url }}">
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <div class="header">
        <div class="hotel-name">
            <span>❤️</span> Pickmi Отель для фембочек и альтушек <span>❤️</span>
        </div>
        <h1>{% block title %}{{ title }}{% endblock %}</h1>
        <div class="date"> Дата формирования: {{ date }}</div>
    </div>
    
    {% block content %}{% endblock %}
    
    <div id="footerContent" class="footer">
        <span> Pickmi Отель | Отчет сгенерирован автоматически | ❤️</span>
    </div>
</body>
</html>
